name: 台股每日分析 LINE 推播

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch: {}

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: run and push
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          PAGE_URL: ${{ vars.PAGE_URL }}
        run: python line_push.py
